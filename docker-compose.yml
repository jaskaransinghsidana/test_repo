services:
  mcp-server:
    build:
      context: ./services/mcp-server
    container_name: sample-mcp-server
    ports:
      - "9000:9000"

  backend:
    build:
      context: ./apps/backend
    container_name: agentic-backend
    env_file:
      - ./.env
    environment:
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://mcp-server:9000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - mcp-server
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./apps/frontend
    container_name: agentic-frontend
    env_file:
      - ./.env
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-/api}
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "5173:5173"

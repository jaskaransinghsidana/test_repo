services:
  mcp-server:
    build:
      context: ./services/mcp-server
    container_name: sample-mcp-server
    ports:
      - "9000:9000"

  backend:
    build:
      context: ./apps/backend
    container_name: agentic-backend
    environment:
      - MCP_SERVER_URL=http://mcp-server:9000
    depends_on:
      - mcp-server
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./apps/frontend
    container_name: agentic-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
